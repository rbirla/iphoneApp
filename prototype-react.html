<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Feed — React + Redux + GraphQL Prototype</title>

<!-- React 18 -->
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<!-- Redux Toolkit -->
<script src="https://unpkg.com/@reduxjs/toolkit@1.9.7/dist/redux-toolkit.umd.development.js"></script>
<!-- React Redux -->
<script src="https://unpkg.com/react-redux@8.1.3/dist/react-redux.min.js"></script>
<!-- Babel (JSX in browser) -->
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #15202B;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
    gap: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .proto-header {
    color: #8899A6;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    text-align: center;
  }
  .proto-badges {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(29,155,240,0.15);
    color: #1D9BF0;
    border: 1px solid rgba(29,155,240,0.3);
  }
  .badge.redux  { background: rgba(118,74,188,0.15); color: #764ABC; border-color: rgba(118,74,188,0.3); }
  .badge.gql    { background: rgba(229,0,127,0.12);  color: #E5007F; border-color: rgba(229,0,127,0.3); }

  /* ── Phone Frame ── */
  .device {
    width: 393px;
    height: 830px;
    background: #000;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 90px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.07);
    border: 10px solid #1C1C1E;
    flex-shrink: 0;
  }
  .device::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 115px; height: 32px;
    background: #1C1C1E;
    border-radius: 0 0 20px 20px;
    z-index: 1000;
  }

  /* ── App Shell ── */
  .app {
    position: absolute;
    inset: 0;
    background: #000000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 44px;
    padding: 14px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    flex-shrink: 0;
    z-index: 100;
  }
  .status-time { color: #fff; font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 5px; align-items: center; color: #fff; font-size: 12px; }

  /* ── Top Nav (Twitter header) ── */
  .top-nav {
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #2F3336;
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 14px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 90;
  }
  .top-nav-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #1D9BF0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    cursor: pointer;
  }
  .top-nav-tabs {
    display: flex;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 0;
  }
  .top-nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex-shrink: 0;
    padding: 8px 16px;
    font-size: 15px;
    font-weight: 700;
    color: #71767B;
    border: none;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
  }
  .nav-tab.active { color: #E7E9EA; }
  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 4px;
    background: #1D9BF0;
    border-radius: 2px;
  }
  .top-nav-icon {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    color: #E7E9EA;
    flex-shrink: 0;
  }

  /* ── Filter Pills (like Twitter "Trending" pills) ── */
  .pill-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid #2F3336;
    flex-shrink: 0;
  }
  .pill-bar::-webkit-scrollbar { display: none; }
  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid #2F3336;
    background: transparent;
    color: #71767B;
    transition: all 0.15s;
  }
  .pill.active {
    background: #E7E9EA;
    color: #0F1419;
    border-color: #E7E9EA;
  }

  /* ── Feed / Scroll ── */
  .feed-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .feed-scroll::-webkit-scrollbar { display: none; }

  /* ── Twitter Card ── */
  .tweet-card {
    display: flex;
    gap: 0;
    padding: 12px 16px;
    border-bottom: 1px solid #2F3336;
    cursor: pointer;
    transition: background 0.12s;
    background: #000;
    position: relative;
  }
  .tweet-card:hover { background: rgba(255,255,255,0.03); }
  .tweet-card.dismissed { opacity: 0; transform: translateX(60px); transition: all 0.25s ease; }

  .tweet-left {
    width: 40px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-right: 12px;
  }
  .tweet-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }

  .tweet-right { flex: 1; min-width: 0; }

  /* Header row */
  .tweet-header {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
    min-width: 0;
  }
  .tweet-name {
    font-size: 15px;
    font-weight: 700;
    color: #E7E9EA;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }
  .tweet-handle {
    font-size: 15px;
    color: #71767B;
    white-space: nowrap;
  }
  .tweet-dot { color: #71767B; font-size: 15px; }
  .tweet-time { font-size: 15px; color: #71767B; white-space: nowrap; }
  .tweet-more {
    margin-left: auto;
    color: #71767B;
    font-size: 18px;
    padding: 2px 4px;
    border-radius: 50%;
    cursor: pointer;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
    border: none;
    background: transparent;
    line-height: 1;
  }
  .tweet-more:hover { color: #1D9BF0; background: rgba(29,155,240,0.1); }

  /* Tweet text (video title) */
  .tweet-text {
    font-size: 15px;
    line-height: 1.4;
    color: #E7E9EA;
    margin-bottom: 10px;
    font-weight: 400;
  }

  /* Media card (thumbnail) — Twitter link card style */
  .media-card {
    border: 1px solid #2F3336;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .media-card:hover .media-card-thumb { filter: brightness(0.9); }
  .media-thumb {
    height: 160px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.12s;
  }
  .media-play {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
  }
  .media-duration {
    position: absolute;
    bottom: 8px; right: 10px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .media-card-body {
    background: #16181C;
    padding: 10px 12px;
    border-top: 1px solid #2F3336;
  }
  .media-domain { font-size: 13px; color: #71767B; margin-bottom: 2px; }
  .media-title {
    font-size: 14px;
    font-weight: 700;
    color: #E7E9EA;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .media-desc {
    font-size: 13px;
    color: #71767B;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: 2px;
    line-height: 1.4;
  }

  /* Tags row */
  .tweet-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tweet-tag {
    font-size: 14px;
    font-weight: 400;
  }

  /* Sentiment badge inline */
  .signal-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .signal-badge.bullish { background: rgba(0,186,124,0.15); color: #00BA7C; }
  .signal-badge.bearish { background: rgba(249,24,128,0.15); color: #F91880; }
  .signal-badge.neutral  { background: rgba(255,166,0,0.12);  color: #FFA600; }

  /* Action row — Twitter style */
  .tweet-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 360px;
    margin-top: 2px;
  }
  .action {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 8px;
    border-radius: 20px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #71767B;
    font-size: 13px;
    font-weight: 400;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .action:hover.comment  { color: #1D9BF0; background: rgba(29,155,240,0.1); }
  .action:hover.signal   { color: #00BA7C; background: rgba(0,186,124,0.1); }
  .action:hover.bearish  { color: #F91880; background: rgba(249,24,128,0.1); }
  .action:hover.bookmark { color: #1D9BF0; background: rgba(29,155,240,0.1); }
  .action:hover.skip     { color: #F91880; background: rgba(249,24,128,0.1); }
  .action.active.signal   { color: #00BA7C; }
  .action.active.bearish  { color: #F91880; }
  .action.active.bookmark { color: #1D9BF0; }
  .action-icon { font-size: 18px; line-height: 1; }

  /* ── Loading skeleton ── */
  .skeleton-card {
    padding: 12px 16px;
    border-bottom: 1px solid #2F3336;
    display: flex; gap: 12px;
  }
  .skel { background: #1C1F23; border-radius: 8px; animation: shimmer 1.5s infinite; }
  .skel-circle { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
  .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── Detail Screen ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: #000; }
  .screen.hidden { display: none; }

  .detail-topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #2F3336;
    flex-shrink: 0;
  }
  .back-btn {
    font-size: 20px; color: #E7E9EA;
    border: none; background: transparent;
    cursor: pointer; padding: 4px;
    border-radius: 50%;
    transition: background 0.1s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.08); }
  .detail-topbar h2 { font-size: 19px; font-weight: 800; color: #E7E9EA; }

  .detail-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-bottom: 80px;
  }
  .detail-scroll::-webkit-scrollbar { display: none; }

  .detail-tweet {
    padding: 12px 16px;
    border-bottom: 1px solid #2F3336;
  }
  .detail-channel-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .detail-name-col { display: flex; flex-direction: column; }
  .detail-display-name { font-size: 15px; font-weight: 700; color: #E7E9EA; }
  .detail-handle { font-size: 14px; color: #71767B; }

  .detail-title-text {
    font-size: 20px;
    font-weight: 400;
    color: #E7E9EA;
    line-height: 1.4;
    margin-bottom: 14px;
  }

  .detail-meta { font-size: 14px; color: #71767B; margin: 12px 0; }
  .detail-meta span { color: #E7E9EA; font-weight: 700; }

  .detail-divider { height: 1px; background: #2F3336; margin: 12px 0; }

  .detail-actions-bar {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 4px 0;
    border-bottom: 1px solid #2F3336;
  }

  /* Signal toggle in detail */
  .signal-toggle-wrap {
    padding: 14px 16px;
    border-bottom: 1px solid #2F3336;
  }
  .signal-toggle-label {
    font-size: 13px; color: #71767B; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .signal-toggle {
    display: flex;
    background: #16181C;
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    border: 1px solid #2F3336;
  }
  .signal-opt {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-size: 13px; font-weight: 700;
    color: #71767B;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .signal-opt.bullish.active { background: rgba(0,186,124,0.2); color: #00BA7C; }
  .signal-opt.bearish.active { background: rgba(249,24,128,0.2); color: #F91880; }
  .signal-opt.neutral.active  { background: rgba(255,166,0,0.15);  color: #FFA600; }

  /* AI Summary section */
  .detail-section {
    padding: 14px 16px;
    border-bottom: 1px solid #2F3336;
  }
  .detail-section-title {
    font-size: 12px; font-weight: 700; color: #71767B;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .ai-summary-text {
    font-size: 15px; color: #E7E9EA; line-height: 1.6;
  }

  /* Your note section */
  .note-display {
    font-size: 15px; color: #1D9BF0;
    font-style: italic; line-height: 1.5;
  }
  .add-note-link {
    font-size: 15px; color: #1D9BF0;
    background: none; border: none;
    cursor: pointer; padding: 0;
    font-style: italic;
    transition: opacity 0.15s;
  }
  .add-note-link:hover { opacity: 0.7; }

  .save-tweet-btn {
    margin: 14px 16px;
    padding: 14px;
    width: calc(100% - 32px);
    border-radius: 9999px;
    border: none;
    background: #1D9BF0;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .save-tweet-btn:hover { background: #1A8CD8; }
  .save-tweet-btn.saved { background: #00BA7C; }

  /* ── Notebook Screen ── */
  .nb-search-wrap {
    padding: 10px 16px;
    border-bottom: 1px solid #2F3336;
    flex-shrink: 0;
  }
  .nb-search-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #16181C;
    border-radius: 9999px;
    padding: 8px 14px;
    border: 1px solid #2F3336;
  }
  .nb-search-icon { color: #71767B; font-size: 15px; }
  .nb-search-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    color: #E7E9EA;
    outline: none;
  }
  .nb-search-input::placeholder { color: #71767B; }

  .nb-stats {
    padding: 8px 16px;
    font-size: 13px; color: #71767B;
    border-bottom: 1px solid #2F3336;
    flex-shrink: 0;
  }

  /* Synthesis card */
  .synthesis-card {
    margin: 12px 16px;
    background: linear-gradient(135deg, #0A2E63 0%, #0D1B33 100%);
    border: 1px solid #1D4ED8;
    border-radius: 16px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .synthesis-card:hover { border-color: #3B82F6; }
  .synthesis-emoji { font-size: 28px; flex-shrink: 0; }
  .synthesis-body { flex: 1; min-width: 0; }
  .synthesis-title { font-size: 15px; font-weight: 700; color: #93C5FD; margin-bottom: 2px; }
  .synthesis-sub { font-size: 13px; color: #60A5FA; opacity: 0.8; }
  .synthesis-arrow { color: #60A5FA; font-size: 18px; }

  /* Notebook entry */
  .nb-entry {
    padding: 12px 16px;
    border-bottom: 1px solid #2F3336;
    cursor: pointer;
    transition: background 0.12s;
    display: flex; gap: 12px;
  }
  .nb-entry:hover { background: rgba(255,255,255,0.03); }
  .nb-entry-right { flex: 1; min-width: 0; }
  .nb-entry-header {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }
  .nb-entry-name { font-size: 15px; font-weight: 700; color: #E7E9EA; }
  .nb-entry-time { font-size: 14px; color: #71767B; }
  .nb-entry-title {
    font-size: 15px; color: #E7E9EA;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .nb-entry-note {
    font-size: 14px;
    color: #1D9BF0;
    font-style: italic;
    background: rgba(29,155,240,0.08);
    border-left: 3px solid #1D9BF0;
    padding: 6px 10px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .nb-entry-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .nb-tags-row { display: flex; gap: 5px; flex-wrap: wrap; }

  /* ── Save Modal (Twitter-style bottom sheet) ── */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    backdrop-filter: blur(2px);
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet {
    background: #000;
    border: 1px solid #2F3336;
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 16px 20px 36px;
    max-height: 88%;
    overflow-y: auto;
    scrollbar-width: none;
    animation: slideUp 0.25s ease;
  }
  .modal-sheet::-webkit-scrollbar { display: none; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 34px; height: 4px;
    background: #333639;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 19px; font-weight: 800; color: #E7E9EA; margin-bottom: 4px; }
  .modal-subtitle { font-size: 14px; color: #71767B; margin-bottom: 14px; }

  .modal-video-row {
    display: flex; align-items: center; gap: 10px;
    background: #16181C;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 16px;
    border: 1px solid #2F3336;
  }
  .modal-video-thumb {
    width: 52px; height: 40px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .modal-video-title-text {
    font-size: 13px; font-weight: 700; color: #E7E9EA;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .modal-section-label {
    font-size: 12px; font-weight: 700; color: #71767B;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  /* Signal buttons in modal */

// MOCK GRAPHQL CLIENT
// Simulates Apollo Client — resolves queries from local data
// In production: replace with real Apollo Client + FastAPI endpoint
// ═══════════════════════════════════════════════════════
const MOCK_DELAY = 300; // ms, simulates network latency

const GQL_QUERIES = {
  GET_USER_FEED:         'GET_USER_FEED',
  GET_VIDEO_DETAIL:      'GET_VIDEO_DETAIL',
  GET_NOTEBOOK_ENTRIES:  'GET_NOTEBOOK_ENTRIES',
};
const GQL_MUTATIONS = {
  SAVE_TO_NOTEBOOK:  'SAVE_TO_NOTEBOOK',
  SET_SENTIMENT:     'SET_SENTIMENT',
  DISMISS_VIDEO:     'DISMISS_VIDEO',
};

// The mock schema resolvers
function createMockClient(videosRef, notebookRef) {
  return {
    query(name, variables = {}) {
      return new Promise((resolve) => {
        setTimeout(() => {
          switch (name) {
            case GQL_QUERIES.GET_USER_FEED: {
              const { filter = 'All' } = variables;
              const vids = filter === 'All'
                ? videosRef.current
                : videosRef.current.filter(v => v.tags.includes(filter));
              resolve({ userFeed: { videos: vids.filter(v => !v.dismissed), totalCount: vids.length } });
              break;
            }
            case GQL_QUERIES.GET_VIDEO_DETAIL: {
              const v = videosRef.current.find(x => x.id === variables.videoId);
              resolve({ video: v || null });
              break;
            }
            case GQL_QUERIES.GET_NOTEBOOK_ENTRIES: {
              resolve({ notebookEntries: [...notebookRef.current] });
              break;
            }
            default:
              resolve({ error: 'Unknown query' });
          }
        }, MOCK_DELAY);
      });
    },
    mutate(name, variables = {}) {
      return new Promise((resolve) => {
        setTimeout(() => {
          switch (name) {
            case GQL_MUTATIONS.SET_SENTIMENT: {
              const v = videosRef.current.find(x => x.id === variables.videoId);
              if (v) v.sentiment = variables.sentiment;
              resolve({ success: true });
              break;
            }
            case GQL_MUTATIONS.DISMISS_VIDEO: {
              const v = videosRef.current.find(x => x.id === variables.videoId);
              if (v) v.dismissed = true;
              resolve({ success: true });
              break;
            }
            case GQL_MUTATIONS.SAVE_TO_NOTEBOOK: {
              const { entry } = variables;
              const v = videosRef.current.find(x => x.id === entry.videoId);
              if (v) { v.note = entry.note; v.sentiment = entry.sentiment; v.tags = entry.tags; }
              const idx = notebookRef.current.findIndex(e => e.videoId === entry.videoId);
              const nb = { id: `nb${Date.now()}`, ...entry };
              if (idx >= 0) notebookRef.current[idx] = nb;
              else notebookRef.current.unshift(nb);
              resolve({ success: true, entry: nb });
              break;
            }
            default:
              resolve({ error: 'Unknown mutation' });
          }
        }, MOCK_DELAY);
      });
    }
  };
}

// React hooks wrapping the mock client
function useGqlQuery(client, queryName, variables) {
  const [state, setState] = useState({ data: null, loading: true, error: null });
  const key = JSON.stringify({ queryName, variables });
  useEffect(() => {
    setState(s => ({ ...s, loading: true }));
    client.query(queryName, variables)
      .then(data => setState({ data, loading: false, error: null }))
      .catch(err  => setState({ data: null, loading: false, error: err.message }));
  }, [key]);
  const refetch = useCallback(() => {
    setState(s => ({ ...s, loading: true }));
    client.query(queryName, variables)
      .then(data => setState({ data, loading: false, error: null }));
  }, [key]);
  return { ...state, refetch };
}

function useGqlMutation(client, mutationName) {
  const [loading, setLoading] = useState(false);
  const mutate = useCallback(async (variables) => {
    setLoading(true);
    try {
      const result = await client.mutate(mutationName, variables);
      setLoading(false);
      return result;
    } catch (e) {
      setLoading(false);
      throw e;
    }
  }, [mutationName]);
  return [mutate, { loading }];
}

// VIDEO CARD (Twitter-style tweet card)
// ═══════════════════════════════════════════════════════
function VideoCard({ video, gqlClient, onRefetch }) {
  const dispatch = useDispatch();
  const [dismissed, setDismissed] = useState(false);
  const [localSentiment, setLocalSentiment] = useState(video.sentiment);
  const [saved, setSaved] = useState(!!video.note);

  const [setSentimentMutation] = useGqlMutation(gqlClient, GQL_MUTATIONS.SET_SENTIMENT);
  const [dismissMutation]      = useGqlMutation(gqlClient, GQL_MUTATIONS.DISMISS_VIDEO);

  const handleCardClick = () => {
    dispatch(setActiveVideo(video.id));
  };

  const handleSignal = async (e, s) => {
    e.stopPropagation();
    const next = localSentiment === s ? null : s;
    setLocalSentiment(next);
    await setSentimentMutation({ videoId: video.id, sentiment: next });
    dispatch(incGql());
    dispatch(showToast(next ? `Marked ${next}` : 'Signal cleared'));
  };

  const handleSave = (e) => {
    e.stopPropagation();
    dispatch(openModal(video.id));
  };

  const handleDismiss = async (e) => {
    e.stopPropagation();
    setDismissed(true);
    await dismissMutation({ videoId: video.id });
    dispatch(incGql());
    setTimeout(() => onRefetch(), 350);
  };

  return (
    <div className={`tweet-card ${dismissed ? 'dismissed' : ''}`} onClick={handleCardClick}>
      <div className="tweet-left">
        <div className="tweet-avatar" style={{ background: video.avatarColor }}>{video.initials}</div>
      </div>
      <div className="tweet-right">
        {/* Header */}
        <div className="tweet-header">
          <span className="tweet-name">{video.channelName}</span>
          <span className="tweet-handle">{video.handle}</span>
          <span className="tweet-dot">·</span>
          <span className="tweet-time">{video.timeAgo}</span>
          <button className="tweet-more" onClick={e => e.stopPropagation()}>···</button>
        </div>

        {/* Title as "tweet text" */}
        <div className="tweet-text">{video.title}</div>

        {/* Thumbnail media card */}
        <div className="media-card" onClick={e => { e.stopPropagation(); handleCardClick(); }}>
          <div className="media-thumb" style={{ background: video.thumbGradient }}>
            <div className="media-play">▶</div>
            <div className="media-duration">{video.duration}</div>
          </div>
          <div className="media-card-body">
            <div className="media-domain">{video.domain}</div>
            <div className="media-title">{video.title}</div>
            <div className="media-desc">{video.summary}</div>
          </div>
        </div>

        {/* Signal badge if set */}
        {localSentiment && <SignalBadge sentiment={localSentiment} />}

        {/* Tags as hashtags */}
        <div className="tweet-tags">
          {video.tags.map(t => {
            const s = TAG_META[t] || DEFAULT_TAG;
            return <span key={t} className="tweet-tag" style={{ color: s.color }}>{t}</span>;
          })}
        </div>

        {/* Action row */}
        <div className="tweet-actions" onClick={e => e.stopPropagation()}>
          <button className="action comment">
            <span className="action-icon">💬</span>
          </button>
          <button
            className={`action signal ${localSentiment === 'bullish' ? 'active' : ''}`}
            onClick={e => handleSignal(e, 'bullish')}
            title="Bullish signal"
          >
            <span className="action-icon">📈</span>
            <span>{localSentiment === 'bullish' ? '1' : ''}</span>
          </button>
          <button
            className={`action bearish ${localSentiment === 'bearish' ? 'active' : ''}`}
            onClick={e => handleSignal(e, 'bearish')}
            title="Bearish signal"
          >
            <span className="action-icon">📉</span>
          </button>
          <button
            className={`action bookmark ${saved ? 'active' : ''}`}
            onClick={handleSave}
            title="Save to notebook"

            <span className="action-icon">{saved ? '🔖' : '🔖'}</span>
          </button>
          <button className="action skip" onClick={handleDismiss} title="Skip">
            <span className="action-icon">✕</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// FEED SCREEN
// ═══════════════════════════════════════════════════════
function FeedScreen({ gqlClient }) {

  const { data, loading, refetch } = useGqlQuery(gqlClient, GQL_QUERIES.GET_USER_FEED, { filter: activeFilter });

  useEffect(() => { dispatch(incGql()); }, []);

  const videos = data?.userFeed?.videos || [];
  const filters = ['All', '$BTC', '$ETH', 'Macro', 'Regulation', 'Geopolitics'];

  return (
    <>
      {/* Twitter-style top nav */}
      <div className="top-nav">
        <div className="top-nav-avatar">R</div>
        <div className="top-nav-tabs">
          <button className="nav-tab active">For you</button>
          <button className="nav-tab">Following</button>
          <button className="nav-tab">Trending</button>
        </div>
        <div className="top-nav-icon">✦</div>
      </div>

      {/* Filter pills */}
      <div className="pill-bar">
        {filters.map(f => (
          <button
            key={f}
            className={`pill ${activeFilter === f ? 'active' : ''}`}

          >

          </button>

      {/* Feed */}

// ═══════════════════════════════════════════════════════
// DETAIL SCREEN
// ═══════════════════════════════════════════════════════
function DetailScreen({ gqlClient }) {
  const dispatch = useDispatch();
  const { activeVideoId } = useSelector(s => s.ui);
  const { data, loading } = useGqlQuery(gqlClient, GQL_QUERIES.GET_VIDEO_DETAIL, { videoId: activeVideoId });
  const [localSentiment, setLocalSentiment] = useState(null);
  const [setSentimentMutation] = useGqlMutation(gqlClient, GQL_MUTATIONS.SET_SENTIMENT);

  const video = data?.video;

  useEffect(() => {
    if (video) setLocalSentiment(video.sentiment);
  }, [video?.id]);

  const handleSignal = async (s) => {
    const next = localSentiment === s ? null : s;
    setLocalSentiment(next);
    await setSentimentMutation({ videoId: video.id, sentiment: next });
    dispatch(incGql());
    dispatch(showToast(next ? `Signal: ${next}` : 'Signal cleared'));
  };

  if (loading) {
    return (
      <>
        <div className="detail-topbar">
          <button className="back-btn" onClick={() => dispatch(setScreen('feed'))}>←</button>
          <h2>Post</h2>
        </div>
        <div className="detail-scroll">{[1,2].map(i => <SkeletonCard key={i} />)}</div>
      </>
    );
  }

  if (!video) return null;

  const sentOpts = [
    { val: 'bullish', icon: '📈', label: 'Bullish' },
    { val: 'neutral', icon: '➖', label: 'Neutral' },
    { val: 'bearish', icon: '📉', label: 'Bearish' },
  ];

  return (
    <>
      <div className="detail-topbar">
        <button className="back-btn" onClick={() => dispatch(setScreen('feed'))}>←</button>
        <h2>Post</h2>
        <button
          style={{ marginLeft: 'auto', background: 'none', border: 'none', color: '#1D9BF0', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}
          onClick={() => dispatch(openModal(video.id))}
        >
          Save
        </button>
      </div>

      <div className="detail-scroll">
        <div className="detail-tweet">
          {/* Channel row */}
          <div className="detail-channel-row">
            <div className="tweet-avatar" style={{ background: video.avatarColor, width: 44, height: 44, fontSize: 16 }}>
              {video.initials}
            </div>
            <div className="detail-name-col">
              <span className="detail-display-name">{video.channelName}</span>
              <span className="detail-handle">{video.handle}</span>
            </div>
            <button style={{ marginLeft: 'auto', background: '#E7E9EA', border: 'none', borderRadius: 9999, padding: '6px 16px', fontWeight: 700, fontSize: 14, cursor: 'pointer', color: '#0F1419' }}>
              Follow
            </button>
          </div>

          {/* Title */}
          <div className="detail-title-text">{video.title}</div>

          {/* Thumbnail */}
          <div className="media-card" style={{ marginBottom: 12 }}>
            <div className="media-thumb" style={{ background: video.thumbGradient, height: 180 }}>
              <div className="media-play" style={{ width: 56, height: 56, fontSize: 22 }}>▶</div>
              <div className="media-duration">{video.duration}</div>
            </div>
          </div>

          {/* Time + date */}
          <div className="detail-meta">
            4:17 PM · Feb 27, 2026 · <span>24.1K</span> Views
          </div>
          <div className="detail-divider" />

          {/* Engagement counts */}
          <div style={{ display: 'flex', gap: 20, padding: '10px 0' }}>
            {[['0', 'Reposts'], ['0', 'Quotes'], [video.note ? '1' : '0', 'Saves']].map(([n, l]) => (
              <span key={l} style={{ fontSize: 14, color: '#71767B' }}>
                <span style={{ color: '#E7E9EA', fontWeight: 700 }}>{n}</span> {l}
              </span>
            ))}
          </div>
          <div className="detail-divider" />

          {/* Detail action row */}
          <div className="detail-actions-bar">
            {[['💬','comment'],['📈','signal'],['📉','bearish'],['🔖','bookmark'],['📤','share']].map(([icon, cls]) => (
              <button key={cls} className={`action ${cls}`}
                onClick={() => cls === 'bookmark' && dispatch(openModal(video.id))}
              >
                <span className="action-icon">{icon}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Signal section */}
        <div className="signal-toggle-wrap">
          <div className="signal-toggle-label">Your Signal</div>
          <div className="signal-toggle">
            {sentOpts.map(o => (
              <button key={o.val}
                className={`signal-opt ${o.val} ${localSentiment === o.val ? 'active' : ''}`}
                onClick={() => handleSignal(o.val)}
              >
                {o.icon} {o.label}
              </button>
            ))}
          </div>
        </div>

        {/* AI Summary */}
        <div className="detail-section">
          <div className="detail-section-title">🤖 AI Summary</div>
          <div className="ai-summary-text">{video.summary}</div>
        </div>

        {/* Tags */}
        <div className="detail-section">
          <div className="detail-section-title">🏷 Tags</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {video.tags.map(t => <TagPill key={t} tag={t} />)}
            <button onClick={() => dispatch(openModal(video.id))}
              style={{ padding: '3px 10px', borderRadius: 9999, border: '1px dashed #1D9BF0', background: 'transparent', color: '#1D9BF0', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
              + Add
            </button>
          </div>
        </div>

        {/* Your note */}
        <div className="detail-section">
          <div className="detail-section-title">📝 Your Analysis</div>
          {video.note
            ? <div className="note-display">"{video.note}"</div>
            : <button className="add-note-link" onClick={() => dispatch(openModal(video.id))}>
                + Add your analysis...
              </button>
          }
        </div>

        <button
          className={`save-tweet-btn ${video.note ? 'saved' : ''}`}
          onClick={() => dispatch(openModal(video.id))}
        >
          {video.note ? '✅ Update Notebook Entry' : '🔖 Save to Research Notebook'}
        </button>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════
// SAVE MODAL
// ═══════════════════════════════════════════════════════
function SaveModal({ gqlClient, videosRef }) {
  const dispatch = useDispatch();
  const { modalOpen, modalVideoId } = useSelector(s => s.ui);
  const [saveToNotebook] = useGqlMutation(gqlClient, GQL_MUTATIONS.SAVE_TO_NOTEBOOK);

  const video = videosRef.current.find(v => v.id === modalVideoId);

  const [modalSentiment, setModalSentiment] = useState(null);
  const [modalTags, setModalTags]           = useState([]);
  const [noteText, setNoteText]             = useState('');

  useEffect(() => {
    if (video) {
      setModalSentiment(video.sentiment);
      setModalTags([...video.tags]);
      setNoteText(video.note || '');
    }
  }, [modalVideoId]);

  if (!modalOpen || !video) return null;

  const allTags = Object.keys(TAG_META);
  const suggestions = allTags.filter(t => !modalTags.includes(t));

  const handleSave = async () => {
    await saveToNotebook({
      entry: {
        videoId: video.id,
        channelName: video.channelName,
        initials: video.initials,
        avatarColor: video.avatarColor,
        title: video.title,
        timeAgo: video.timeAgo,
        sentiment: modalSentiment,
        note: noteText,
        tags: modalTags,
      }
    });
    dispatch(incGql());
    dispatch(closeModal());
    dispatch(showToast('✅ Saved to Research Notebook'));
  };

  const sentOpts = [
    { val: 'bullish', icon: '📈', label: 'Bullish' },
    { val: 'neutral', icon: '➖', label: 'Neutral' },
    { val: 'bearish', icon: '📉', label: 'Bearish' },
  ];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && dispatch(closeModal())}>
      <div className="modal-sheet">
        <div className="modal-handle" />
        <div className="modal-title">Save to Notebook</div>
        <div className="modal-subtitle">Annotate this signal with your analysis</div>

        {/* Video preview row */}
        <div className="modal-video-row">
          <div className="modal-video-thumb" style={{ background: video.thumbGradient }}>▶</div>
          <div className="modal-video-title-text">{video.title}</div>
        </div>

        {/* AI preview */}
        <div className="modal-section-label">AI Summary</div>
        <div className="modal-ai-preview">{video.summary}</div>

        {/* Signal */}
        <div className="modal-section-label">Your Signal</div>
        <div className="modal-signal-row">
          {sentOpts.map(o => (
            <button key={o.val}
              className={`modal-signal-btn ${o.val} ${modalSentiment === o.val ? 'active' : ''}`}
              onClick={() => setModalSentiment(modalSentiment === o.val ? null : o.val)}
            >
              {o.icon} {o.label}
            </button>
          ))}
        </div>

        {/* Tags */}
        <div className="modal-section-label">Tags</div>
        <div className="modal-tags-area">
          {modalTags.map(t => (
            <TagPill key={t} tag={t} onRemove={t => setModalTags(prev => prev.filter(x => x !== t))} />
          ))}
        </div>
        <div className="tag-suggestions-row">
          {suggestions.map(t => {
            const s = TAG_META[t] || DEFAULT_TAG;
            return (
              <button key={t} className="tag-suggest-pill"
                style={{ color: s.color, borderColor: s.color }}
                onClick={() => setModalTags(prev => [...prev, t])}
              >
                {t}
              </button>
            );
          })}
        </div>

        {/* Notes */}
        <div className="modal-section-label">Your Analysis</div>
        <textarea
          className="modal-notes"
          value={noteText}
          onChange={e => setNoteText(e.target.value)}
          placeholder="What does this mean for your thesis? Contradictions, follow-up questions, price levels..."
        />

        <div className="modal-btns">
          <button className="modal-btn secondary" onClick={() => dispatch(closeModal())}>Cancel</button>
          <button className="modal-btn primary" onClick={handleSave}>Save Entry</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════
function BottomNav() {
  const dispatch = useDispatch();
  const { screen } = useSelector(s => s.ui);
  const tabs = [
    { id: 'feed',     icon: '🏠', label: 'Home'     },
    { id: 'search',   icon: '🔍', label: 'Search'   },
    { id: 'notebook', icon: '📓', label: 'Notebook' },
    { id: 'profile',  icon: '👤', label: 'Profile'  },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map(t => (
        <button key={t.id} className="bot-item"
          onClick={() => dispatch(setScreen(t.id))}>
          <span className={`bot-icon ${screen === t.id ? 'active' : ''}`}>{t.icon}</span>
          <span className={`bot-label ${screen === t.id ? 'active' : ''}`}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function Toast() {
  const dispatch = useDispatch();
  const { toastMsg } = useSelector(s => s.ui);
  const [visible, setVisible] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (toastMsg) {
      setVisible(true);
      clearTimeout(timerRef.current);
      timerRef.current = setTimeout(() => {
        setVisible(false);
        dispatch(hideToast());
      }, 2200);
    }
  }, [toastMsg]);

  if (!visible || !toastMsg) return null;
  return (
    <div className="toast-wrap">
      <div className="toast-inner">{toastMsg}</div>
    </div>
  );
}

function GqlBadge() {
  const { gqlCallCount } = useSelector(s => s.ui);
  return (

}

// ═══════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════
function App() {
  // Mutable refs so mock client has access to latest data
  const videosRef   = useRef(INITIAL_VIDEOS.map(v => ({ ...v })));
  const notebookRef = useRef(INITIAL_NOTEBOOK.map(e => ({ ...e })));

  // Create mock GraphQL client once
  const gqlClient = useMemo(() => createMockClient(videosRef, notebookRef), []);

  const { screen } = useSelector(s => s.ui);

  const screenMap = {
    feed:     <FeedScreen     gqlClient={gqlClient} />,
    detail:   <DetailScreen   gqlClient={gqlClient} />,
    notebook: <NotebookScreen gqlClient={gqlClient} />,
    search:   <FeedScreen     gqlClient={gqlClient} />,
    profile:  <FeedScreen     gqlClient={gqlClient} />,
  };

  return (
    <div className="app">
      <div className="status-bar">
        <span className="status-time">4:17</span>
        <div className="status-icons"><span>▲▼</span><span>📶</span><span>🔋</span></div>
      </div>

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
        {screenMap[screen] || screenMap.feed}
      </div>

      <BottomNav />
      <SaveModal gqlClient={gqlClient} videosRef={videosRef} />
      <Toast />
      <GqlBadge />
    </div>
  );
}

// ═══════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <Provider store={store}>
    <App />
  </Provider>
);
</script>
